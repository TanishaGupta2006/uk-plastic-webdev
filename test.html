<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slick Slider</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css">

<style>

body{
    background:#f5f5f5;
    margin:0;
    padding:50px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.slider-item{
    padding:0 10px;
}

.slider-img{
    width:100%;
    height:180px;
    object-fit:contain;
    display:block;
}

.slick-list{
    overflow:hidden;
}

.slick-track{
    display:flex;
    align-items:center;
}

.slick-prev,
.slick-next{
    z-index:9999;
    width:40px;
    height:40px;
}

.slick-prev{
    left:-45px;
}

.slick-next{
    right:-45px;
}

.slick-prev:before,
.slick-next:before{
    color:red;
    font-size:40px;
}

</style>

</head>

<body>

<div class="container">

    <div class="dish-slider">

        <div class="slider-item">
            <img src="whyimg1.png" class="slider-img">
        </div>

        <div class="slider-item">
            <img src="whyimg1.png" class="slider-img">
        </div>

        <div class="slider-item">
            <img src="whyimg1.png" class="slider-img">
        </div>

        <div class="slider-item">
            <img src="whyimg1.png" class="slider-img">
        </div>

        <div class="slider-item">
            <img src="whyimg1.png" class="slider-img">
        </div>

        <div class="slider-item">
            <img src="whyimg1.png" class="slider-img">
        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<script>

$('.dish-slider').slick({
    slidesToShow: 4,
    slidesToScroll: 1,
    arrows: true,
    dots: false,
    autoplay: true,
    autoplaySpeed: 2000
});

</script>

</body>
</html>
